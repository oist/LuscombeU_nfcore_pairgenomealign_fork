# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "fasta_bgzip_index_dict_samtools"
description: Sort SAM/BAM/CRAM file
keywords:
  - bgzip
  - faidx
  - dict
  - fasta
components:
  - samtools/bgzip
  - samtools/dict
  - samtools/faidx
input:
  - ch_fasta:
      type: file
      description: |
        FASTA file, compressed or not.
        Structure: [ val(meta), path(fasta) ]
      pattern: "*.{fa,fa.gz,fa.bz2,fa.xz,fasta,fasta.gz,fasta.bz2,fasta.xz}"
output:
  - fasta_fai_gzi_dict:
      type: file
      description: |
        Channel containing:
          - BGZF-compressed FASTA
          - FASTA index (.fai)
          - BGZF index (.gzi)
          - sequence dictionary (.dict)
        Structure:
          [ val(meta), path(fasta_gz), path(fai), path(gzi), path(dict) ]
      pattern: "*"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/^.*samtools //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@charles-plessy"
maintainers:
  - "@charles-plessy"
